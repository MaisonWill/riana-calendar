name: Update Occupancy Calendar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar update
        run: python main.py --run-once

      - name: Commit and push changes
        run: |
          git config user.name "Calendar Bot"
          git config user.email "bot@example.com"
          git add data/occupancy_calendar.html data/occupancy.json logs/parser.log
          if ! git diff --cached --quiet; then
            git commit -m "Update occupancy calendar $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
