<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Календарь доступности</title>
<style>
  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --surface-hover: #FAFAF8;
    --text-primary: #1C1917;
    --text-secondary: #78716C;
    --text-muted: #B8B2AA;
    --text-weekend: #6B7280;
    --border: #E8E4DF;
    --border-light: #F0EDE9;
    --accent: #4A6FA5;
    --accent-soft: #E8EEF6;
    --accent-text: #2C4A73;
    --booked-bg: #F0EDEA;
    --booked-text: #C4BDB5;
    --today-bg: #E0E8F2;
    --today-text: #2C4A73;
    --shadow-sm: 0 1px 3px rgba(28,25,23,0.04), 0 1px 2px rgba(28,25,23,0.02);
    --shadow-md: 0 4px 16px rgba(28,25,23,0.06), 0 2px 6px rgba(28,25,23,0.03);
    --shadow-lg: 0 12px 40px rgba(28,25,23,0.08), 0 4px 12px rgba(28,25,23,0.04);
    --radius: 12px;
    --radius-sm: 8px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'SF Pro Display', 'SF Pro Text', -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    padding-bottom: 60px;
  }

  /* ═══ HEADER ═══ */
  .header {
    padding: 40px 24px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.6s var(--ease) 0.1s forwards;
  }

  .header-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent-soft) 0%, #D6E2F0 100%);
    border-radius: 14px;
    margin-bottom: 16px;
  }

  .header-icon svg {
    width: 24px;
    height: 24px;
    color: var(--accent);
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    line-height: 1.15;
  }

  .header p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 6px;
    letter-spacing: 0.01em;
  }

  /* ═══ STICKY BAR ═══ */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 12px 20px 0;
    transition: box-shadow 0.3s var(--ease);
  }

  .sticky-bar.scrolled {
    box-shadow: 0 4px 20px rgba(28,25,23,0.06);
  }

  /* ═══ DROPDOWN ═══ */
  .dropdown-wrap {
    position: relative;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.6s var(--ease) 0.2s forwards;
  }

  .dropdown-btn {
    width: 100%;
    padding: 14px 18px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-family: inherit;
    transition: all 0.2s var(--ease);
    box-shadow: var(--shadow-sm);
    letter-spacing: -0.01em;
    -webkit-tap-highlight-color: transparent;
  }

  .dropdown-btn:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-md), 0 0 0 3px rgba(74,111,165,0.06);
  }

  .dropdown-btn.open {
    border-color: var(--accent);
    box-shadow: var(--shadow-md), 0 0 0 3px rgba(74,111,165,0.08);
    border-radius: var(--radius) var(--radius) 4px 4px;
  }

  .dropdown-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-align: left;
  }

  .dropdown-arrow {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s var(--ease);
    color: var(--text-secondary);
  }

  .dropdown-arrow.open { transform: rotate(180deg); }

  .dropdown-menu {
    position: absolute;
    top: calc(100% - 2px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-top: 1px solid var(--border-light);
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: var(--shadow-lg);
    max-height: 0;
    overflow: hidden;
    z-index: 200;
    transition: max-height 0.3s var(--ease), opacity 0.25s var(--ease);
    opacity: 0;
  }

  .dropdown-menu.open {
    max-height: 360px;
    overflow-y: auto;
    opacity: 1;
  }

  .dropdown-menu::-webkit-scrollbar { width: 6px; }
  .dropdown-menu::-webkit-scrollbar-track { background: transparent; }
  .dropdown-menu::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .dropdown-item {
    width: 100%;
    padding: 12px 18px;
    border: none;
    background: transparent;
    text-align: left;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-primary);
    cursor: pointer;
    font-family: inherit;
    border-bottom: 1px solid var(--border-light);
    transition: all 0.15s var(--ease);
    letter-spacing: -0.01em;
  }

  .dropdown-item:last-child { border-bottom: none; }

  .dropdown-item:hover { background: var(--surface-hover); }

  .dropdown-item.active {
    background: var(--accent-soft);
    color: var(--accent-text);
    font-weight: 600;
  }

  /* ═══ LEGEND ═══ */
  .legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 4px 0 12px;
    font-size: 11.5px;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
    opacity: 0;
    animation: fadeIn 0.5s var(--ease) 0.35s forwards;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .legend-dot.free {
    background: var(--surface);
    border: 1.5px solid var(--border);
  }

  .legend-dot.booked {
    background: var(--booked-bg);
    border: 1.5px solid #E0DCD7;
  }

  .legend-dot.today {
    background: var(--today-bg);
    border: 1.5px solid #C4D4E8;
  }

  /* ═══ WEEKDAY HEADER ═══ */
  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 6px 4px 8px;
    border-bottom: 1px solid var(--border-light);
    background: var(--bg);
  }

  .weekday-cell {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    padding: 4px 0;
  }

  .weekday-cell.weekend { color: #C9B99A; }

  /* ═══ CALENDAR BODY ═══ */
  .calendar-body {
    padding: 0 20px 0;
  }

  .month-block {
    padding-top: 24px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.5s var(--ease) forwards;
  }

  .month-label {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    padding: 0 4px 10px;
    letter-spacing: -0.3px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .month-label .year-tag {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0;
  }

  .week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    cursor: default;
    transition: all 0.15s var(--ease);
    position: relative;
  }

  .day-cell.free {
    background: var(--surface);
    box-shadow: 0 1px 2px rgba(28,25,23,0.03);
  }

  .day-cell.free:hover {
    transform: scale(1.08);
    box-shadow: var(--shadow-md);
    z-index: 2;
  }

  .day-cell.free .day-num {
    color: var(--text-primary);
    font-weight: 500;
  }

  .day-cell.free.weekend .day-num {
    color: var(--text-weekend);
  }

  .day-cell.booked {
    background: var(--booked-bg);
  }

  .day-cell.booked .day-num {
    color: var(--booked-text);
    font-weight: 400;
  }

  .day-cell.today {
    background: var(--today-bg);
    box-shadow: 0 0 0 2px rgba(74,111,165,0.12);
  }

  .day-cell.today .day-num {
    color: var(--today-text);
    font-weight: 700;
  }

  .day-cell.past .day-num {
    color: var(--text-muted);
    font-weight: 400;
  }

  .day-cell.past { opacity: 0.6; }

  .day-num {
    font-size: 14px;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .empty-cell {
    aspect-ratio: 1;
  }

  /* ═══ FOOTER ═══ */
  .calendar-footer {
    text-align: center;
    padding: 36px 0 20px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .gen-date {
    display: block;
    margin-top: 8px;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: none;
    color: var(--text-muted);
    opacity: 0.7;
  }

  /* ═══ ANIMATIONS ═══ */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* ═══ MONTH STAGGER ═══ */
  .month-block:nth-child(1)  { animation-delay: 0.15s; }
  .month-block:nth-child(2)  { animation-delay: 0.22s; }
  .month-block:nth-child(3)  { animation-delay: 0.29s; }
  .month-block:nth-child(4)  { animation-delay: 0.34s; }
  .month-block:nth-child(5)  { animation-delay: 0.38s; }
  .month-block:nth-child(6)  { animation-delay: 0.41s; }
  .month-block:nth-child(7)  { animation-delay: 0.43s; }
  .month-block:nth-child(8)  { animation-delay: 0.45s; }
  .month-block:nth-child(9)  { animation-delay: 0.46s; }
  .month-block:nth-child(10) { animation-delay: 0.47s; }
  .month-block:nth-child(11) { animation-delay: 0.48s; }
  .month-block:nth-child(12) { animation-delay: 0.49s; }
  .month-block:nth-child(13) { animation-delay: 0.50s; }

  /* ═══ SUBTLE GRAIN OVERLAY ═══ */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* ═══ SCROLL ═══ */
  ::-webkit-scrollbar { width: 0; }
  html { scrollbar-width: none; }

  /* ═══ SELECTION ═══ */
  ::selection {
    background: var(--accent-soft);
    color: var(--accent-text);
  }
</style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <h1>Календарь доступности</h1>
    <p>Выберите объект для проверки свободных дат</p>
  </div>

  <!-- STICKY BAR -->
  <div class="sticky-bar" id="stickyBar">

    <!-- DROPDOWN -->
    <div class="dropdown-wrap">
      <button class="dropdown-btn" id="dropdownBtn" onclick="toggleDropdown()">
        <span class="dropdown-label" id="dropdownLabel"></span>
        <span class="dropdown-arrow" id="dropdownArrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 6 8 10 12 6"/>
          </svg>
        </span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu"></div>
    </div>

    <!-- LEGEND -->
    <div class="legend">
      <span class="legend-item"><span class="legend-dot free"></span> Свободно</span>
      <span class="legend-item"><span class="legend-dot booked"></span> Забронировано</span>
      <span class="legend-item"><span class="legend-dot today"></span> Сегодня</span>
    </div>

    <!-- WEEKDAYS -->
    <div class="weekday-row">
      <div class="weekday-cell">Пн</div>
      <div class="weekday-cell">Вт</div>
      <div class="weekday-cell">Ср</div>
      <div class="weekday-cell">Чт</div>
      <div class="weekday-cell">Пт</div>
      <div class="weekday-cell weekend">Сб</div>
      <div class="weekday-cell weekend">Вс</div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="calendar-body" id="calendarBody"></div>

  <!-- FOOTER -->
  <div class="calendar-footer">
    — конец календаря —
    <span class="gen-date" id="genDate"></span>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  DEMO DATA — replace with CALENDAR_DATA
// ═══════════════════════════════════════════
const CALENDAR_DATA = (function() {
  const props = [
    { id: "p1",  name: "Villa Sunset — Chaweng Beach" },
    { id: "p2",  name: "Ocean View Apt — Lamai" },
    { id: "p3",  name: "Palm House — Bophut" },
    { id: "p4",  name: "Hillside Studio — Maenam" },
    { id: "p5",  name: "Garden Bungalow — Nathon" },
    { id: "p6",  name: "Beachfront Condo — Chaweng Noi" },
    { id: "p7",  name: "Jungle Retreat — Lamai Hills" },
    { id: "p8",  name: "Pool Villa — Bophut" },
    { id: "p9",  name: "Cozy Flat — Fisherman's Village" },
    { id: "p10", name: "Sea Breeze Suite — Bangrak" },
    { id: "p11", name: "Tropical Loft — Lipa Noi" },
    { id: "p12", name: "Panorama Villa — Chaweng" },
  ];

  const bookings = {};
  const today = new Date();

  props.forEach((p, pi) => {
    const b = [];
    const seed = pi * 7 + 3;
    for (let i = 0; i < 9; i++) {
      const off = seed + i * 19 + (pi % 4) * 6;
      const dur = 3 + (i % 6) + (pi % 3);
      const s = new Date(today);
      s.setDate(s.getDate() + off);
      const e = new Date(s);
      e.setDate(e.getDate() + dur);
      b.push({
        start: s.toISOString().slice(0,10),
        end: e.toISOString().slice(0,10)
      });
    }
    bookings[p.id] = b;
  });

  return {
    properties: props,
    bookings: bookings,
    generated_at: new Date().toISOString()
  };
})();

// ═══════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════
const MONTHS_RU = [
  'Январь','Февраль','Март','Апрель','Май','Июнь',
  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'
];

let selectedId = CALENDAR_DATA.properties[0].id;
let dropdownOpen = false;

// Parse bookings into date sets per property
const bookedSets = {};
CALENDAR_DATA.properties.forEach(p => {
  const set = new Set();
  (CALENDAR_DATA.bookings[p.id] || []).forEach(b => {
    const s = new Date(b.start + 'T00:00:00');
    const e = new Date(b.end + 'T00:00:00');
    for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
      set.add(d.toISOString().slice(0,10));
    }
  });
  bookedSets[p.id] = set;
});

function toKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function getMondayIdx(date) {
  const d = date.getDay();
  return d === 0 ? 6 : d - 1;
}

function buildMonths() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const months = [];
  for (let m = 0; m < 13; m++) {
    const y = today.getFullYear() + Math.floor((today.getMonth() + m) / 12);
    const mo = (today.getMonth() + m) % 12;
    const first = new Date(y, mo, 1);
    const lastDay = new Date(y, mo + 1, 0).getDate();
    const startDow = getMondayIdx(first);
    const weeks = [];
    let week = new Array(startDow).fill(null);
    for (let d = 1; d <= lastDay; d++) {
      week.push(new Date(y, mo, d));
      if (week.length === 7) { weeks.push(week); week = []; }
    }
    if (week.length) {
      while (week.length < 7) week.push(null);
      weeks.push(week);
    }
    months.push({ year: y, month: mo, weeks });
  }
  return months;
}

const calendarMonths = buildMonths();
const todayKey = toKey(new Date());
const todayTime = new Date(); todayTime.setHours(0,0,0,0);

function renderDropdownItems() {
  const menu = document.getElementById('dropdownMenu');
  menu.innerHTML = '';
  CALENDAR_DATA.properties.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'dropdown-item' + (p.id === selectedId ? ' active' : '');
    btn.textContent = p.name;
    btn.onclick = () => selectProperty(p.id);
    menu.appendChild(btn);
  });
}

function selectProperty(id) {
  selectedId = id;
  closeDropdown();
  updateLabel();
  renderCalendar();
}

function updateLabel() {
  const p = CALENDAR_DATA.properties.find(x => x.id === selectedId);
  document.getElementById('dropdownLabel').textContent = p ? p.name : '';
}

function toggleDropdown() {
  dropdownOpen ? closeDropdown() : openDropdown();
}

function openDropdown() {
  dropdownOpen = true;
  document.getElementById('dropdownBtn').classList.add('open');
  document.getElementById('dropdownArrow').classList.add('open');
  const menu = document.getElementById('dropdownMenu');
  menu.classList.add('open');
  renderDropdownItems();
}

function closeDropdown() {
  dropdownOpen = false;
  document.getElementById('dropdownBtn').classList.remove('open');
  document.getElementById('dropdownArrow').classList.remove('open');
  document.getElementById('dropdownMenu').classList.remove('open');
}

function renderCalendar() {
  const body = document.getElementById('calendarBody');
  const booked = bookedSets[selectedId] || new Set();
  let html = '';

  calendarMonths.forEach(m => {
    html += '<div class="month-block">';
    html += '<div class="month-label">' + MONTHS_RU[m.month] +
            ' <span class="year-tag">' + m.year + '</span></div>';

    m.weeks.forEach(week => {
      html += '<div class="week-row">';
      week.forEach((day, di) => {
        if (!day) {
          html += '<div class="empty-cell"></div>';
          return;
        }

        const key = toKey(day);
        const isToday = key === todayKey;
        const isBooked = booked.has(key);
        const isPast = day < todayTime && !isToday;
        const isWeekend = di >= 5;

        let cls = 'day-cell';
        if (isToday) {
          cls += ' today';
        } else if (isBooked) {
          cls += ' booked';
        } else if (isPast) {
          cls += ' past';
        } else {
          cls += ' free';
          if (isWeekend) cls += ' weekend';
        }

        html += '<div class="' + cls + '"><span class="day-num">' +
                day.getDate() + '</span></div>';
      });
      html += '</div>';
    });

    html += '</div>';
  });

  body.innerHTML = html;
}

// Sticky shadow
function handleScroll() {
  const bar = document.getElementById('stickyBar');
  bar.classList.toggle('scrolled', window.scrollY > 80);
}

// Close dropdown on outside click
document.addEventListener('click', function(e) {
  if (dropdownOpen && !e.target.closest('.dropdown-wrap')) {
    closeDropdown();
  }
});

window.addEventListener('scroll', handleScroll, { passive: true });

// Init
updateLabel();
renderCalendar();
document.getElementById('genDate').textContent =
  'Обновлено: ' + new Date(CALENDAR_DATA.generated_at).toLocaleString('ru-RU');
</script>
</body>
</html>
