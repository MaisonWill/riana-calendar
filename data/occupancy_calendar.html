<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riana Calendar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --side-bg: #0E0E10;
    --side-surface: #18181C;
    --side-hover: #222228;
    --side-active: #2C2C34;
    --side-text: #808088;
    --side-text-bright: #EEEEF2;
    --side-border: #28282E;
    --side-accent: #D4A84B;
    --side-accent-dim: rgba(212,168,75,0.12);
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --text: #18181C;
    --text-sec: #6E6E78;
    --text-muted: #AEAEB8;
    --border: #E4E1DB;
    --border-light: #EDEAE4;

    --free-bg: #EAF7EA;
    --free-text: #276B27;
    --free-border: rgba(39,107,39,0.18);

    --booked-bg: #DC3545;
    --booked-text: #FFFFFF;
    --booked-cap-bg: #C62C3A;
    --booked-mid-bg: #E04F5C;

    --blocked-bg: #6C757D;
    --blocked-text: #FFFFFF;
    --blocked-mid-bg: #868E96;

    --today-ring: #4A7ACC;
    --today-bg: #D6E8FF;
    --today-text: #1E4F9C;

    --past-opacity: 0.35;
    --radius: 12px;
    --radius-sm: 7px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --sidebar-w: 290px;
    --topbar-h: 70px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); display:flex; overflow:hidden; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width:var(--sidebar-w); min-width:var(--sidebar-w); height:100vh;
    background:var(--side-bg); display:flex; flex-direction:column;
    position:relative; z-index:10; flex-shrink:0;
  }
  .sidebar::after {
    content:''; position:absolute; top:0; right:0; width:1px; height:100%;
    background:linear-gradient(180deg,transparent 5%,rgba(212,168,75,0.15) 30%,rgba(212,168,75,0.15) 70%,transparent 95%);
  }
  .side-header { padding:22px 20px 16px; border-bottom:1px solid var(--side-border); flex-shrink:0; }
  .side-brand { display:flex; align-items:center; gap:12px; }
  .side-logo {
    width:36px; height:36px;
    background:linear-gradient(135deg,var(--side-accent),#A87C2A);
    border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .side-logo svg { width:18px; height:18px; color:#111; }
  .side-title { font-size:14px; font-weight:700; color:var(--side-text-bright); letter-spacing:-0.2px; line-height:1.3; }
  .side-subtitle { font-size:11px; color:var(--side-text); margin-top:3px; opacity:0.55; }

  /* View toggle */
  .view-toggle {
    display:flex; gap:6px; padding:12px 12px 10px;
    border-bottom:1px solid var(--side-border); flex-shrink:0;
  }
  .vt-btn {
    flex:1; padding:7px 6px; border:1px solid var(--side-border);
    background:transparent; border-radius:7px; cursor:pointer;
    font-family:inherit; font-size:11px; font-weight:600;
    color:var(--side-text); transition:all 0.15s var(--ease);
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .vt-btn:hover { background:var(--side-hover); color:var(--side-text-bright); }
  .vt-btn.active { background:var(--side-accent-dim); border-color:rgba(212,168,75,0.35); color:var(--side-accent); }
  .vt-btn:focus-visible, .prop-btn:focus-visible, .gdrive-btn:focus-visible, .mob-select:focus-visible, .ov-row:focus-visible {
    outline: 2px solid var(--side-accent);
    outline-offset: 2px;
  }


  .side-label { padding:14px 20px 7px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--side-text); opacity:0.4; flex-shrink:0; }
  .side-list { flex:1; overflow-y:auto; padding:0 8px 16px; scrollbar-width:thin; scrollbar-color:var(--side-border) transparent; }
  .side-list::-webkit-scrollbar { width:3px; }
  .side-list::-webkit-scrollbar-track { background:transparent; }
  .side-list::-webkit-scrollbar-thumb { background:var(--side-border); border-radius:2px; }

  /* Property row — simple: dot + name + badges + gdrive */
  .prop-row { display:flex; align-items:stretch; gap:5px; margin-bottom:3px; }
  .prop-btn {
    flex:1; padding:9px 12px; border:none; background:transparent;
    border-radius:8px; cursor:pointer; text-align:left; font-family:inherit;
    transition:all 0.14s var(--ease); position:relative;
    display:flex; align-items:center; gap:10px; min-width:0;
  }
  .prop-btn:hover { background:var(--side-hover); }
  .prop-btn.active { background:var(--side-active); }
  .prop-btn.active::before {
    content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
    width:3px; height:22px; background:var(--side-accent); border-radius:0 3px 3px 0;
  }
  .prop-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; transition:background 0.14s var(--ease); }
  .prop-btn.active .prop-dot { background:var(--side-accent); }
  .prop-btn:not(.active) .prop-dot { background:var(--side-border); }
  .prop-btn:hover:not(.active) .prop-dot { background:var(--side-text); }
  .prop-name {
    font-size:13px; font-weight:400; color:var(--side-text);
    letter-spacing:-0.01em; line-height:1.3; transition:color 0.14s var(--ease);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .prop-btn:hover .prop-name { color:var(--side-text-bright); }
  .prop-btn.active .prop-name { color:var(--side-text-bright); font-weight:550; }
  .mini-badges { display:inline-flex; flex-wrap:wrap; align-items:center; gap:6px 8px; font-size:11px; font-weight:500; opacity:0.9; margin-left:2px; vertical-align:middle; }
  .mini-badges .badge-item { display:inline-flex; align-items:center; gap:3px; color:var(--side-text); }
  .prop-btn.active .mini-badges .badge-item { color:var(--side-text-bright); }

  .gdrive-btn {
    flex-shrink:0; width:36px; min-width:36px;
    display:flex; align-items:center; justify-content:center;
    background:var(--side-surface); border:1px solid var(--side-border);
    border-radius:8px; color:var(--side-accent); text-decoration:none;
    transition:background 0.14s var(--ease),transform 0.1s var(--ease);
  }
  .gdrive-btn:hover { background:var(--side-hover); transform:scale(1.05); }
  .gdrive-btn svg { width:17px; height:17px; display:block; }

  /* Keyboard hint */
  .kb-hint { font-size:10px; color:var(--side-text); opacity:0.35; display:flex; align-items:center; gap:6px; padding:0 20px 10px; flex-shrink:0; }
  .kb-key { background:var(--side-surface); border:1px solid var(--side-border); border-radius:4px; padding:1px 5px; font-family:'JetBrains Mono',monospace; font-size:10px; }

  .side-footer { padding:12px 20px; border-top:1px solid var(--side-border); flex-shrink:0; }
  .side-gen { font-size:10px; color:var(--side-text); opacity:0.35; font-family:'JetBrains Mono',monospace; }

  /* ─── MAIN ─── */
  .main { flex:1; height:100vh; overflow-y:auto; position:relative; }
  .main::-webkit-scrollbar { width:7px; }
  .main::-webkit-scrollbar-track { background:transparent; }
  .main::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  /* Topbar — glass */
  .topbar {
    position:sticky; top:0; z-index:50;
    background:rgba(245,243,239,0.9);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    padding:16px 32px; display:flex; align-items:center;
    justify-content:space-between; gap:16px; flex-wrap:wrap;
    border-bottom:1px solid transparent;
    transition:border-color 0.3s var(--ease),box-shadow 0.3s var(--ease);
    min-height:var(--topbar-h);
  }
  .topbar.scrolled { border-color:var(--border); box-shadow:0 4px 24px rgba(0,0,0,0.04); }
  .topbar-left { display:flex; align-items:center; gap:14px; min-width:0; }
  .prop-title {
    font-size:21px; font-weight:800; color:var(--text); letter-spacing:-0.5px;
    display:flex; flex-wrap:wrap; align-items:center; gap:8px 14px; max-width:100%;
  }
  .prop-title .pt-name { font-weight:800; }
  .prop-title .pt-badges { display:inline-flex; flex-wrap:wrap; align-items:center; gap:10px 14px; font-size:15px; font-weight:500; color:var(--text-sec); }
  .prop-title .badge-item { display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
  .prop-title .badge-item .bi { font-size:1.1em; line-height:1; opacity:0.95; }

  /* Topbar month stats */
  .month-stats { display:flex; gap:20px; flex-shrink:0; }
  .ms-item { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-sec); }
  .ms-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .ms-dot.free { background:var(--free-bg); border:1px solid var(--free-border); }
  .ms-dot.booked { background:var(--booked-bg); }
  .ms-dot.blocked { background:var(--blocked-bg); }
  .ms-val { font-weight:700; color:var(--text); }
  .ms-label { font-size:11px; color:var(--text-muted); margin-right:6px; }

  .mobile-header { display:none; }

  /* ─── MONTH GRID (single view) ─── */
  .month-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:20px 32px 60px; }
  @keyframes cardIn { to { opacity:1; transform:translateY(0); } }
  .month-card {
    background:var(--surface); border-radius:var(--radius);
    border:1px solid var(--border-light); padding:16px 14px 12px;
    transition:box-shadow 0.2s var(--ease),transform 0.2s var(--ease);
    opacity:0; transform:translateY(8px); animation:cardIn 0.35s var(--ease) forwards;
  }
  .month-card:hover { box-shadow:0 8px 28px rgba(0,0,0,0.06); transform:translateY(-2px); }
  .month-card:nth-child(1){animation-delay:.02s}.month-card:nth-child(2){animation-delay:.05s}
  .month-card:nth-child(3){animation-delay:.08s}.month-card:nth-child(4){animation-delay:.11s}
  .month-card:nth-child(5){animation-delay:.14s}.month-card:nth-child(6){animation-delay:.17s}
  .month-card:nth-child(7){animation-delay:.20s}.month-card:nth-child(8){animation-delay:.23s}
  .month-card:nth-child(9){animation-delay:.26s}.month-card:nth-child(10){animation-delay:.29s}
  .month-card:nth-child(11){animation-delay:.32s}.month-card:nth-child(12){animation-delay:.35s}
  .mc-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
  .mc-month-name { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-0.2px; }
  .mc-year { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }

  /* Monthly occupancy bar */
  .mc-occ { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
  .mc-occ-bar { flex:1; height:4px; background:var(--border-light); border-radius:2px; overflow:hidden; }
  .mc-occ-fill { height:100%; border-radius:2px; transition:width 0.5s var(--ease); }
  .mc-occ-fill.low { background:#43A047; }
  .mc-occ-fill.mid { background:#FB8C00; }
  .mc-occ-fill.high { background:#E53935; }
  .mc-occ-pct { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-weight:500; }

  .mc-weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
  .mc-wd { text-align:center; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); padding:2px 0 5px; }
  .mc-wd.wd-end { color:#C4B89A; }

  .mc-days { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .mc-empty { aspect-ratio:1; }

  /* ─── DAY CELLS: pill / range ─── */
  .mc-day {
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    font-size:11.5px; font-weight:500; font-variant-numeric:tabular-nums;
    cursor:default; transition:all 0.1s var(--ease); position:relative;
    border-radius:5px;
  }

  .mc-day.free { background:var(--free-bg); color:var(--free-text); }
  .mc-day.free:hover { filter:brightness(0.94); transform:scale(1.12); z-index:2; }

  .mc-day.booked { background:var(--booked-mid-bg); color:var(--booked-text); border-radius:4px; }
  .mc-day.booked.range-start { background:var(--booked-cap-bg); border-radius:6px 3px 3px 6px; }
  .mc-day.booked.range-end   { background:var(--booked-cap-bg); border-radius:3px 6px 6px 3px; }
  .mc-day.booked.range-solo  { background:var(--booked-cap-bg); border-radius:6px; }
  .mc-day.booked:hover { filter:brightness(1.12); z-index:2; }

  .mc-day.blocked { background:var(--blocked-mid-bg); color:var(--blocked-text); border-radius:4px; }
  .mc-day.blocked.range-start { background:var(--blocked-bg); border-radius:6px 3px 3px 6px; }
  .mc-day.blocked.range-end   { background:var(--blocked-bg); border-radius:3px 6px 6px 3px; }
  .mc-day.blocked.range-solo  { background:var(--blocked-bg); border-radius:6px; }

  .mc-day.today {
    background:var(--today-bg); color:var(--today-text); font-weight:800;
    box-shadow:0 0 0 2px rgba(74,122,204,0.5),0 2px 8px rgba(74,122,204,0.2);
    border-radius:6px; z-index:3;
  }

  .mc-day.past { opacity:var(--past-opacity); }

  /* ─── TOOLTIP ─── */
  .tooltip {
    position:fixed; z-index:1000; pointer-events:none;
    background:#18181C; color:#EEEEF2; padding:8px 12px;
    border-radius:9px; font-size:12px; line-height:1.5;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
    opacity:0; transition:opacity 0.15s var(--ease);
    max-width:200px; white-space:nowrap;
    border:1px solid rgba(255,255,255,0.07);
  }
  .tooltip.visible { opacity:1; }
  .tt-date { font-weight:700; color:var(--side-accent); margin-bottom:2px; }
  .tt-nights { color:#AAA; font-size:11px; }

  /* ─── OVERVIEW MODE ─── */
  .overview-grid { padding:20px 32px 60px; display:flex; flex-direction:column; gap:12px; }
  @keyframes rowIn { to { opacity:1; transform:translateX(0); } }
  .ov-row {
    background:var(--surface); border-radius:var(--radius); border:1px solid var(--border-light);
    padding:12px 16px; display:flex; align-items:center; gap:14px;
    transition:box-shadow 0.2s,transform 0.2s;
    opacity:0; transform:translateX(-6px); animation:rowIn 0.3s var(--ease) forwards;
  }
  .ov-row:nth-child(1){animation-delay:.03s}.ov-row:nth-child(2){animation-delay:.06s}
  .ov-row:nth-child(3){animation-delay:.09s}.ov-row:nth-child(4){animation-delay:.12s}
  .ov-row:nth-child(5){animation-delay:.15s}.ov-row:nth-child(6){animation-delay:.18s}
  .ov-row:nth-child(7){animation-delay:.21s}.ov-row:nth-child(8){animation-delay:.24s}
  .ov-row:nth-child(9){animation-delay:.27s}.ov-row:nth-child(10){animation-delay:.30s}
  .ov-row:nth-child(11){animation-delay:.33s}.ov-row:nth-child(12){animation-delay:.36s}
  .ov-row:hover { box-shadow:0 4px 16px rgba(0,0,0,0.06); transform:translateY(-1px); cursor:pointer; }
  .ov-name { width:100px; font-size:13px; font-weight:700; color:var(--text); flex-shrink:0; }
  .ov-badges { font-size:11px; color:var(--text-sec); width:72px; flex-shrink:0; display:flex; flex-direction:column; gap:2px; }
  .ov-months { flex:1; display:grid; grid-template-columns:repeat(12,1fr); gap:3px; align-items:center; }
  .ov-month { position:relative; height:28px; border-radius:5px; overflow:hidden; background:var(--free-bg); }
  .ov-month-seg { position:absolute; top:0; height:100%; }
  .ov-month-seg.booked { background:var(--booked-bg); opacity:0.85; }
  .ov-month-seg.blocked { background:var(--blocked-bg); opacity:0.7; }
  .ov-mlabel { position:absolute; bottom:2px; left:0; right:0; text-align:center; font-size:8px; color:rgba(0,0,0,0.3); font-weight:600; pointer-events:none; }
  .ov-occ { width:44px; text-align:right; font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace; flex-shrink:0; }

  /* Noise overlay */
  .main::before { content:''; position:fixed; top:0; left:var(--sidebar-w); right:0; bottom:0; pointer-events:none; z-index:999; opacity:0.01; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:256px; }

  /* Mobile */
  @media (max-width:1200px) { .month-grid { grid-template-columns:repeat(3,1fr); } }
  @media (max-width:900px)  { .month-grid { grid-template-columns:repeat(2,1fr); gap:12px; padding:12px 20px 48px; } .topbar { padding:14px 20px; } .prop-title { font-size:18px; } .month-stats { gap:12px; } }
  @media (max-width:680px)  {
    body { flex-direction:column; overflow:auto; } html,body { overflow:auto; height:auto; }
    .sidebar { display:none; }

    .mobile-header {
      display:flex; flex-direction:column; background:var(--side-bg);
      position:sticky; top:0; z-index:60; border-bottom:1px solid var(--side-border);
    }
    .mh-top { display:flex; align-items:center; justify-content:space-between; padding:12px 14px 10px; }
    .mobile-header .side-brand { gap:10px; }
    .mobile-header .side-logo { width:32px; height:32px; border-radius:8px; }
    .mobile-header .side-logo svg { width:16px; height:16px; }
    .mobile-header .side-title { font-size:15px; }
    .mobile-header .side-gen { font-size:10px; color:var(--side-text); opacity:0.5; font-family:'JetBrains Mono',monospace; margin-top:2px; }

    .mh-actions { display:flex; align-items:center; gap:8px; }
    .mobile-header .gdrive-btn { width:32px; min-width:32px; height:32px; background:var(--side-surface); border-color:var(--side-border); }
    .mobile-header .gdrive-btn svg { width:15px; height:15px; }

    .mobile-header .view-toggle { padding:0 14px 10px; border-bottom:none; }

    .mh-select-wrap { padding:0 14px 12px; }
    .mob-select { width:100%; padding:10px 34px 10px 12px; background:var(--side-surface); border:1px solid var(--side-border); border-radius:8px; font-size:14px; font-weight:500; color:var(--side-text-bright); font-family:inherit; appearance:none; background-image:url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' stroke='%23808088' stroke-width='2' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='4 6 8 10 12 6'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 12px center; cursor:pointer; transition:all 0.15s var(--ease); }
    .mob-select:focus { outline:none; border-color:var(--side-accent); background-color:var(--side-hover); }

    .main { height:auto; overflow:visible; } .topbar { padding:10px 14px; flex-direction:column; align-items:flex-start; }
    .month-grid { grid-template-columns:1fr; gap:10px; padding:8px 14px 40px; }
    .overview-grid { padding:8px 14px 40px; }
    .main::before { left:0; }

    /* Overview row mobile adjustments */
    .ov-row { flex-wrap:wrap; align-items:flex-start; padding:12px; gap:10px; position:relative; }
    .ov-name { width:100%; font-size:14px; padding-right:50px; }
    .ov-badges { width:100%; flex-direction:row; flex-wrap:wrap; gap:8px; margin-top:-4px; margin-bottom:4px; }
    .ov-months { width:100%; }
    .ov-occ { position:absolute; top:12px; right:12px; width:auto; font-size:13px; }
  }
  ::selection { background:var(--today-bg); color:var(--today-text); }
</style>
</head>
<body>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"><div class="tt-date" id="ttDate"></div><div class="tt-nights" id="ttNights"></div></div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="side-header">
    <div class="side-brand">
      <div class="side-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div>
        <div class="side-title">Riana Calendar</div>
        <div class="side-subtitle">12 объектов · Год вперёд</div>
      </div>
    </div>
  </div>

  <div class="view-toggle">
    <button class="vt-btn active" id="btnSingle" onclick="setView('single')" aria-pressed="true">

function tk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dow(d){ const v=d.getDay(); return v===0?6:v-1; }
function esc(s){
  if(s==null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){ return esc(s).replace(/'/g,'&#39;'); }

function formatBadges(p, mini){

}

// Compute monthly stats
function monthStats(propId, year, month){
  const booked=bSets[propId]||new Set(), blocked=blSets[propId]||new Set();
  const days=new Date(year,month+1,0).getDate();
  let b=0,bl=0,f=0;
  for(let d=1;d<=days;d++){
    const k=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(booked.has(k)) b++;
    else if(blocked.has(k)) bl++;
    else f++;
  }
  return {booked:b,blocked:bl,free:f,total:days};
}

// Compute occupancy % for next 30 days (for overview)
function occNext30(propId){
  const booked=bSets[propId]||new Set(), blocked=blSets[propId]||new Set();
  let taken=0;
  for(let i=0;i<30;i++){
    const d=new Date(today); d.setDate(d.getDate()+i);
    const k=tk(d);
    if(booked.has(k)||blocked.has(k)) taken++;
  }
  return Math.round(taken/30*100);
}

// Find which booking range a date belongs to (for tooltip)
function getRangeInfo(propId, dateKey){
  for(const r of (bRanges[propId]||[])){
    const k0=tk(r.start), k1=tk(r.end);
    if(dateKey>=k0 && dateKey<=k1){
      const nights=r.nights||(Math.round((r.end-r.start)/86400000)+1);
      return {type:'booked', start:r.start, end:r.end, nights:nights};
    }
  }
  for(const r of (blRanges[propId]||[])){
    const k0=tk(r.start), k1=tk(r.end);
    if(dateKey>=k0 && dateKey<=k1){
      const nights=r.nights||(Math.round((r.end-r.start)/86400000)+1);
      return {type:'blocked', start:r.start, end:r.end, nights:nights};
    }
  }
  return null;
}

function formatRuDate(d){
  const months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return d.getDate()+' '+months[d.getMonth()];
}

function buildMonths(){
  const ms=[];
  for(let i=0;i<12;i++){
    const y=today.getFullYear()+Math.floor((today.getMonth()+i)/12);
    const m=(today.getMonth()+i)%12;
    const first=new Date(y,m,1);
    const last=new Date(y,m+1,0).getDate();
    const sd=dow(first);
    const weeks=[];
    let w=new Array(sd).fill(null);
    for(let d=1;d<=last;d++){ w.push(new Date(y,m,d)); if(w.length===7){weeks.push(w);w=[];} }
    if(w.length){while(w.length<7)w.push(null);weeks.push(w);}
    ms.push({year:y,month:m,weeks,lastDay:last});
  }
  return ms;
}

// ─── Day class with pill ranges ───
function renderDayClass(day, booked, blocked){
  if(!day) return '';
  const key=tk(day), isT=key===todayKey, isB=booked.has(key), isBl=blocked.has(key), isP=day<today&&!isT;
  let c='mc-day';
  if(isT){ c+=' today'; return c; }
  if(isB){
    c+=' booked';
    const prev=new Date(day); prev.setDate(prev.getDate()-1);
    const next=new Date(day); next.setDate(next.getDate()+1);
    const hasPrev=booked.has(tk(prev)), hasNext=booked.has(tk(next));
    if(!hasPrev&&!hasNext) c+=' range-solo';
    else if(!hasPrev) c+=' range-start';
    else if(!hasNext) c+=' range-end';
    if(isP) c+=' past';
    return c;
  }
  if(isBl){
    c+=' blocked';
    const prev=new Date(day); prev.setDate(prev.getDate()-1);
    const next=new Date(day); next.setDate(next.getDate()+1);
    const hasPrev=blocked.has(tk(prev)), hasNext=blocked.has(tk(next));
    if(!hasPrev&&!hasNext) c+=' range-solo';
    else if(!hasPrev) c+=' range-start';
    else if(!hasNext) c+=' range-end';
    if(isP) c+=' past';
    return c;
  }
  c+=' free';
  if(isP) c+=' past';
  return c;
}

    const occClass=occPct>70?'high':occPct>40?'mid':'low';
    h+='<div class="month-card">';
    h+='<div class="mc-header"><span class="mc-month-name">'+MO[m.month]+'</span><span class="mc-year">'+m.year+'</span></div>';

    h+='<div class="mc-days">';
    m.weeks.forEach(function(week){
      week.forEach(function(day){
        if(!day){h+='<div class="mc-empty"></div>';return;}
        var key=tk(day);
        var cls=renderDayClass(day,booked,blocked);
        var isB=booked.has(key), isBl=blocked.has(key);
        var hasInfo=(isB||isBl)&&day>=today;
        h+='<div class="'+cls+'"'+(hasInfo?' data-key="'+key+'" data-pid="'+escAttr(sel)+'"':'')+'>'+day.getDate()+'</div>';
      });
    });
    h+='</div></div>';
  });

}

    let monthsHtml='';
    months.forEach(function(m){

      let segHtml='';
      for(let d=1;d<=days;d++){
        const key=m.year+'-'+String(m.month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const left=((d-1)/days*100).toFixed(1)+'%';
        const width=(1/days*100).toFixed(1)+'%';
        if(booked.has(key)) segHtml+='<div class="ov-month-seg booked" style="left:'+left+';width:'+width+'"></div>';
        else if(blocked.has(key)) segHtml+='<div class="ov-month-seg blocked" style="left:'+left+';width:'+width+'"></div>';
      }
      monthsHtml+='<div class="ov-month" title="'+MO[m.month]+' '+m.year+'">'+segHtml+'<span class="ov-mlabel">'+MO_SHORT[m.month]+'</span></div>';
    });
    h+='<div class="ov-row" tabindex="0" role="button" onclick="setViewAndSelect(\'single\',\''+escAttr(p.id)+'\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click();}">';
    h+='<div class="ov-name">'+esc(p.display_name||p.name)+'</div>';
    h+='<div class="ov-badges">'+(p.bedrooms?'<span>🛏 '+esc(String(p.bedrooms))+' сп.</span>':'')+'</div>';
    h+='<div class="ov-months">'+monthsHtml+'</div>';
    h+='<div class="ov-occ" style="color:'+occColor+'">'+totalOcc+'%</div>';
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('contentArea').innerHTML=h;
}

// ─── Tooltip ───
const tooltip=document.getElementById('tooltip');
const ttDate=document.getElementById('ttDate');
const ttNights=document.getElementById('ttNights');

function attachTooltips(){
  document.querySelectorAll('[data-key]').forEach(function(el){
    el.addEventListener('mouseenter', function(e){
      var info=getRangeInfo(this.dataset.pid, this.dataset.key);
      if(!info){tooltip.classList.remove('visible');return;}
      var s=formatRuDate(info.start), en=formatRuDate(info.end);
      ttDate.textContent=s+' — '+en;
      ttNights.textContent=info.type==='booked'?info.nights+' ночей · бронь':info.nights+' дн. · закрыто';
      tooltip.classList.add('visible');
    });
    el.addEventListener('mousemove', function(e){
      var x=e.clientX+14, y=e.clientY-50;
      if(x+200>window.innerWidth) x=e.clientX-214;
      if(y<8) y=e.clientY+14;
      tooltip.style.left=x+'px'; tooltip.style.top=y+'px';
    });
    el.addEventListener('mouseleave', function(){tooltip.classList.remove('visible');});
  });
}

// ─── View control ───
function updateMobileUI() {
  var isSingle = (currentView === 'single');

  // Update view toggle buttons in mobile header
  var mobBtnSingle = document.getElementById('mobBtnSingle');
  var mobBtnOverview = document.getElementById('mobBtnOverview');
  if (mobBtnSingle) {
    mobBtnSingle.classList.toggle('active', isSingle);
    mobBtnSingle.setAttribute('aria-pressed', isSingle ? 'true' : 'false');
  }
  if (mobBtnOverview) {
    mobBtnOverview.classList.toggle('active', !isSingle);
    mobBtnOverview.setAttribute('aria-pressed', !isSingle ? 'true' : 'false');
  }

  // Show/hide select wrap based on view
  var selectWrap = document.getElementById('mobSelectWrap');
  if (selectWrap) selectWrap.style.display = isSingle ? 'block' : 'none';

  // Update GDrive link
  var gDriveBtn = document.getElementById('mobGDrive');
  if (gDriveBtn) {
    var cur = CALENDAR_DATA.properties.find(function(x){return x.id===sel;});
    if (cur && cur.photos_url && isSingle) {
      gDriveBtn.href = cur.photos_url;
      gDriveBtn.style.display = 'flex';
    } else {
      gDriveBtn.style.display = 'none';
    }
  }
}

function setView(v){
  currentView=v;
  var singleActive = (v==='single');
  var btnSingle = document.getElementById('btnSingle');
  btnSingle.classList.toggle('active', singleActive);
  btnSingle.setAttribute('aria-pressed', singleActive ? 'true' : 'false');

  var overviewActive = (v==='overview');
  var btnOverview = document.getElementById('btnOverview');
  btnOverview.classList.toggle('active', overviewActive);
  btnOverview.setAttribute('aria-pressed', overviewActive ? 'true' : 'false');

  updateMobileUI();
  renderTopbarStats();
  document.getElementById('mainArea').scrollTop=0;
  if(v==='single') renderSingleView();
  else renderOverviewView();
}

function setViewAndSelect(v, propId){
  sel=propId;
  renderSidebar();
  document.getElementById('mobSelect').value=propId;
  setView(v);
}

function selectProp(id){
  sel=id;
  document.querySelectorAll('.prop-btn').forEach(function(b){
    var isActive = (b.dataset.id===id);
    b.classList.toggle('active',isActive);
    b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
  document.getElementById('mobSelect').value=id;
  updateMobileUI();
  renderTopbarStats();
  if(currentView==='single') renderSingleView();
  document.getElementById('mainArea').scrollTop=0;
}

// ─── Keyboard navigation ───
document.addEventListener('keydown', function(e){
  if(currentView!=='single') return;
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    var props=CALENDAR_DATA.properties;
    var idx=props.findIndex(function(p){return p.id===sel;});
    if(idx<0) return;
    var next=e.key==='ArrowRight'?(idx+1)%props.length:(idx-1+props.length)%props.length;
    selectProp(props[next].id);
  }
});

// ─── Scroll shadow for glass topbar ───
const mainEl=document.getElementById('mainArea');
const topbar=document.getElementById('topbar');
mainEl.addEventListener('scroll', function(){topbar.classList.toggle('scrolled',mainEl.scrollTop>10);},{passive:true});
window.addEventListener('scroll', function(){topbar.classList.toggle('scrolled',window.scrollY>10);},{passive:true});

// ─── Init ───
renderSidebar();
renderMobSelect();
updateMobileUI();
renderTopbarStats();
renderSingleView();
const genDate = new Date(CALENDAR_DATA.generated_at);
const timeStr = genDate.toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
const tz = genDate.toLocaleTimeString('en-US', {timeZoneName:'short'}).split(' ').pop();
const genText = 'Обновлено ' + timeStr + ' (' + tz + ')';
document.getElementById('sideGen').textContent = genText;
var mobGen = document.getElementById('mobGen');
if (mobGen) mobGen.textContent = genText;
</script>
