}
function renderMobSelect() {
  document.getElementById('mobSelect').innerHTML = CALENDAR_DATA.properties.map(function(p) {
    return '<option value="'+escAttr(p.id)+'"'+(p.id===sel?' selected':'')+'>'+esc(p.display_name||p.name)+'</option>';
  }).join('');
}
function renderGrid() {
  const grid = document.getElementById('monthGrid');
  const booked = bSets[sel] || new Set();
  var cur = CALENDAR_DATA.properties.find(function(x){ return x.id===sel; }) || {};
  document.getElementById('propTitle').innerHTML = titleHtml(cur);
  let h = '';
  months.forEach(m => {
    h += '<div class="month-card"><div class="mc-header"><span class="mc-month">'+MO[m.month]+'</span><span class="mc-year">'+m.year+'</span></div>';
    h += '<div class="mc-weekdays">'; WD.forEach((w,i) => h += '<div class="mc-wd'+(i>=5?' wd-end':'')+'">'+w+'</div>'); h += '</div>';
    h += '<div class="mc-days">';
    m.weeks.forEach(week => {
      week.forEach((day,di) => {
        if (!day) { h += '<div class="mc-empty"></div>'; return; }
        const key = tk(day), isT = key===todayKey, isB = booked.has(key), isP = day<today&&!isT;
        let c = 'mc-day';
        if (isT) c += ' today';
        else if (isB) { c += ' booked'; if (isP) c += ' past'; }
        else { c += ' free'; if (isP) c += ' past'; }
        h += '<div class="'+c+'">'+day.getDate()+'</div>';
      });
    });
    h += '</div></div>';
  });
  grid.innerHTML = h;
  document.getElementById('mainArea').scrollTop = 0;
}
function selectProp(id) {
  sel = id;
  document.querySelectorAll('.prop-btn').forEach(b => b.classList.toggle('active', b.dataset.id===id));
  document.getElementById('mobSelect').value = id;
  renderGrid();
}
const mainEl = document.getElementById('mainArea');
const topbar = document.getElementById('topbar');
mainEl.addEventListener('scroll', () => { topbar.classList.toggle('scrolled', mainEl.scrollTop>10); }, {passive:true});
window.addEventListener('scroll', () => { topbar.classList.toggle('scrolled', window.scrollY>10); }, {passive:true});
renderSidebar(); renderMobSelect(); renderGrid();
document.getElementById('sideGen').textContent = 'Обновлено ' + new Date(CALENDAR_DATA.generated_at).toLocaleString('ru-RU');
</script>
</body>
</html>
